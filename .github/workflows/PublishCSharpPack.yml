name: "C# - Publish CodeQL Pack"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync Queries to Main"]
    types:
      - completed

jobs:
  publish:
    name: Publish C# Pack
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    permissions:
      packages: write
      contents: write
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CodeQL CLI
        id: install-codeql
        uses: github/codeql-action/setup-codeql@v4

      - name: Setup CodeQL Path
        run: echo "$(dirname ${{ steps.install-codeql.outputs.codeql-path }})" >> $GITHUB_PATH

      - name: Validate and Publish
        id: publish_step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd codeql-custom-queries-csharp
          
          echo "Installation des dépendances..."
          codeql pack install
          
          # 1. Détection du fichier de pack
          PACK_FILE=$(ls qlpack.yml 2>/dev/null || ls codeql-pack.yml 2>/dev/null)
          if [ -z "$PACK_FILE" ]; then echo "Pack file not found"; exit 1; fi
          
          # 2. Gestion de la version
          OWNER="green-code-initiative"
          PACKAGE_NAME="csharp-queries"
          
          RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/users/$OWNER/packages/container/$PACKAGE_NAME/versions")
          
          LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.[0].metadata.container.tags[0]' 2>/dev/null)

          if [ "$LATEST_VERSION" == "null" ] || [ -z "$LATEST_VERSION" ]; then
            NEW_VERSION="1.0.0"
          else
            echo "Dernière version C# trouvée : $LATEST_VERSION"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          
          echo "Nouvelle version C# : $NEW_VERSION"
          sed -i "s/^version: .*/version: $NEW_VERSION/" "$PACK_FILE"
          
          echo "Publication du pack C#..."
          codeql pack publish
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version update
        id: commit_step
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add codeql-custom-queries-csharp/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(csharp): bump version to ${{ steps.publish_step.outputs.new_version }} [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Mark status via API
        if: steps.commit_step.outputs.new_sha != ''
        run: |
          curl -L -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.commit_step.outputs.new_sha }} \
            -d '{
              "state":"success",
              "context":"Publish C#",
              "description":"Pack C# publié avec succès",
              "target_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
