name: "Actions - Publish CodeQL Pack"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Sync Queries to Main"]
    types:
      - completed

jobs:
  publish:
    name: Publish Actions Pack
    runs-on: ubuntu-latest
    # On garde la condition de succès pour workflow_run
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    permissions:
      packages: write
      contents: write
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour comparer les commits

      - name: Check for changes in target directory
        id: filter
        run: |
          # Si c'est un déclenchement manuel, on force l'exécution
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            # On compare le commit actuel avec le précédent (HEAD^)
            # On filtre sur le dossier spécifique
            if git diff --quiet HEAD^ HEAD -- codeql-custom-queries-actions/; then
              echo "Aucun changement détecté dans codeql-custom-queries-actions."
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "Changements détectés."
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Install CodeQL CLI
        if: steps.filter.outputs.changed == 'true'
        id: install-codeql
        uses: github/codeql-action/setup-codeql@v4

      - name: Setup CodeQL Path
        if: steps.filter.outputs.changed == 'true'
        run: echo "$(dirname ${{ steps.install-codeql.outputs.codeql-path }})" >> $GITHUB_PATH

      - name: Validate and Publish
        if: steps.filter.outputs.changed == 'true'
        id: publish_step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd codeql-custom-queries-actions
          echo "Installation des dépendances et vérification..."
          codeql pack install
          
          PACK_FILE=$(ls qlpack.yml 2>/dev/null || ls codeql-pack.yml 2>/dev/null)
          if [ -z "$PACK_FILE" ]; then echo "Pack file not found"; exit 1; fi
          
          OWNER="green-code-initiative"
          PACKAGE_NAME="actions-queries"
          
          RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/users/$OWNER/packages/container/$PACKAGE_NAME/versions")
          
          LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.[0].metadata.container.tags[0]' 2>/dev/null)

          if [ "$LATEST_VERSION" == "null" ] || [ -z "$LATEST_VERSION" ]; then
            NEW_VERSION="1.0.0"
          else
            echo "Dernière version trouvée : $LATEST_VERSION"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          
          echo "Nouvelle version déterminée : $NEW_VERSION"
          sed -i "s/^version: .*/version: $NEW_VERSION/" "$PACK_FILE"
          
          echo "Publication du pack..."
          codeql pack publish
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version update
        if: steps.filter.outputs.changed == 'true'
        id: commit_step
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add codeql-custom-queries-actions/
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(actions): bump version to ${{ steps.publish_step.outputs.new_version }} [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Mark status via API
        if: steps.filter.outputs.changed == 'true' && steps.commit_step.outputs.new_sha != ''
        run: |
          curl -L -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.commit_step.outputs.new_sha }} \
            -d '{
              "state":"success",
              "context":"Publish Actions",
              "description":"Pack Actions publié avec succès",
              "target_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'