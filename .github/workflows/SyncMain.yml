name: "Sync Queries to Main"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # S'exécute tous les soirs à minuit UTC
  workflow_run:
    workflows: ["Run CodeQL Unit Tests"]
    types:
      - completed
    branches:
      - 'test'

jobs:
  sync-on-success:
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Sync, Extract and Push
        run: |
          # 1. Identifier le point de départ
          git fetch origin main test
          git checkout main
          
          if [ -f ".last_sync" ]; then
            LAST_SHA=$(cat .last_sync)
          else
            LAST_SHA=$(git rev-list --max-parents=0 HEAD | tail -n 1)
          fi

          # 2. Préparation de la structure
          git checkout test
          mkdir -p /tmp/sync_root
          CURRENT_TEST_SHA=$(git rev-parse HEAD)

          FILES=$(find codeql-custom-queries-* -name "*.ql" || true)
          for file in $FILES; do
            if [ -f "$file" ]; then
              PACK_NAME=$(echo "$file" | cut -d/ -f1)
              LANG=$(echo "$PACK_NAME" | sed 's/codeql-custom-queries-//')
              CATEGORY=$(echo "$file" | cut -d/ -f2)
              FILENAME=$(basename "$file")
              FINAL_PATH="codeql-custom-queries-$LANG/$CATEGORY/$FILENAME"
              mkdir -p "/tmp/sync_root/$(dirname "$FINAL_PATH")"
              cp "$file" "/tmp/sync_root/$FINAL_PATH"
            fi
          done

          # 3. Récupération des auteurs
          AUTHORS=$(git log ${LAST_SHA}..HEAD --format='%an|%ae' | \
                    sort -u | \
                    awk -F'|' '{printf "Co-authored-by: %s <%s>\n", $1, $2}' | \
                    grep -v "github-actions" || true)

          # 4. Application sur Main
          git checkout main
          git pull origin main

          find codeql-custom-queries-* -name "*.ql" -delete || true
          if [ -d "/tmp/sync_root" ] && [ "$(ls -A /tmp/sync_root)" ]; then
            cp -rv /tmp/sync_root/* .
          fi

          echo "$CURRENT_TEST_SHA" > .last_sync

          # 5. Commit et Push (Sécurité anti-vide)
          git add .
          if git diff --staged --quiet; then
            echo "Rien à synchroniser (aucune modification détectée)."
          else
            echo "chore: sync and flatten queries" > commit_msg.txt
            if [ -n "$AUTHORS" ]; then
              echo "" >> commit_msg.txt
              echo "$AUTHORS" >> commit_msg.txt
            fi
            git commit -F commit_msg.txt
            git push origin main
          fi
