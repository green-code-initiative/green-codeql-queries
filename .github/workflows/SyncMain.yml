name: "Sync Queries to Main"

on:
  workflow_dispatch: 
  workflow_run:
    workflows: ["Run CodeQL Unit Tests"]
    types:
      - completed
    branches:
      - 'test'

jobs:
  sync-on-success:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Branch (test)
        uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Sync, Extract and Push
        run: |
          # 1. Préparation de la structure (Identique)
          mkdir -p /tmp/sync_root
          FILES=$(find codeql-custom-queries-* -name "*.ql" || true)

          for file in $FILES; do
            if [ -f "$file" ]; then
              PACK_NAME=$(echo "$file" | cut -d/ -f1)
              LANG=$(echo "$PACK_NAME" | sed 's/codeql-custom-queries-//')
              CATEGORY=$(echo "$file" | cut -d/ -f2)
              FILENAME=$(basename "$file")
              FINAL_PATH="codeql-custom-queries-$LANG/$CATEGORY/$FILENAME"
              mkdir -p "/tmp/sync_root/$(dirname "$FINAL_PATH")"
              cp "$file" "/tmp/sync_root/$FINAL_PATH"
            fi
          done

          # 2. RÉCUPÉRATION DU DERNIER VRAI AUTEUR
          # --no-merges : Ignore les commits de fusion
          # -1 : Prend uniquement le premier résultat trouvé (le plus récent)
          LAST_REAL_AUTHOR=$(git log -1 --no-merges --format='%an|%ae' HEAD)
          
          if [ -z "$LAST_REAL_AUTHOR" ]; then
            echo "Aucun commit réel trouvé, abandon de l'extraction de l'auteur."
            CO_AUTHOR=""
          else
            A_NAME=$(echo "$LAST_REAL_AUTHOR" | cut -d'|' -f1)
            A_EMAIL=$(echo "$LAST_REAL_AUTHOR" | cut -d'|' -f2)
            
            # Exclusion du bot si c'est lui qui a fait le dernier commit réel
            if [[ "$A_NAME" == *"github-actions"* ]]; then
              CO_AUTHOR=""
            else
              CO_AUTHOR="Co-authored-by: $A_NAME <$A_EMAIL>"
            fi
          fi

          # 3. Basculement sur main
          git checkout main
          git pull origin main

          # 4. Nettoyage et injection
          find codeql-custom-queries-* -name "*.ql" -delete || true
          if [ -d "/tmp/sync_root" ] && [ "$(ls -A /tmp/sync_root)" ]; then
            cp -rv /tmp/sync_root/* .
          fi

          # 5. Commit et Push
          git add .
          if git diff --staged --quiet; then
            echo "Aucun changement réel détecté."
          else
            echo "chore: sync and flatten queries" > commit_msg.txt
            if [ -n "$CO_AUTHOR" ]; then
              echo "" >> commit_msg.txt
              echo "$CO_AUTHOR" >> commit_msg.txt
            fi
            
            git commit -F commit_msg.txt
            git push origin main
          fi
