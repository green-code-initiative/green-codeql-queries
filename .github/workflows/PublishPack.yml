name: "CodeQL - Multi-language Publish"

on:
  workflow_run:
    workflows: ["Actions - Run CodeQL Unit Tests"]
    types:
      - completed
  workflow_dispatch:

jobs:
  # Vérification que les tests ont réussi ou que c'est un lancement manuel
  check-success:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "Lancement de la publication..."

  detect-changes:
    needs: check-success
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Mode Manuel : Publication de tous les packs..."
            DIFF=$(ls -d codeql-custom-queries-*/ 2>/dev/null | sed 's/\///g' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            echo "Mode Automatique : Détection des changements..."
            # Détection des dossiers modifiés entre le commit actuel et le précédent
            DIFF=$(git diff --name-only HEAD^ HEAD 2>/dev/null | grep '^codeql-custom-queries-' | cut -d/ -f1 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          if [ -z "$DIFF" ] || [ "$DIFF" == "[]" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$DIFF" >> $GITHUB_OUTPUT
          fi

  test-and-publish:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      statuses: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CodeQL CLI
        id: install-codeql
        uses: github/codeql-action/setup-codeql@v4

      - name: Add CodeQL to PATH
        run: |
          # Ajoute le binaire au PATH pour toutes les étapes suivantes
          echo "$(dirname ${{ steps.install-codeql.outputs.codeql-path }})" >> $GITHUB_PATH

      - name: Bump Version and Publish
        id: publish_step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ matrix.package }}
          
          # Identification du fichier pack
          PACK_FILE=$(ls qlpack.yml 2>/dev/null || ls codeql-pack.yml 2>/dev/null)
          if [ -z "$PACK_FILE" ]; then echo "Pack file not found in ${{ matrix.package }}"; exit 1; fi
          
          # Extraction dynamique du nom du pack (owner/name)
          FULL_PACK_NAME=$(grep "^name:" "$PACK_FILE" | sed 's/name:[[:space:]]*//' | tr -d '"' | tr -d "'")
          OWNER=$(echo $FULL_PACK_NAME | cut -d/ -f1)
          PACKAGE_NAME=$(echo $FULL_PACK_NAME | cut -d/ -f2)

          echo "Vérification de la version pour $FULL_PACK_NAME..."

          # Récupération de la version actuelle sur GitHub Container Registry
          RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/users/$OWNER/packages/container/$PACKAGE_NAME/versions")
          
          LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.[0].metadata.container.tags[0]' 2>/dev/null)

          if [ "$LATEST_VERSION" == "null" ] || [ -z "$LATEST_VERSION" ]; then
            NEW_VERSION="1.0.0"
          else
            echo "Version actuelle : $LATEST_VERSION"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          
          echo "Nouvelle version : $NEW_VERSION"
          sed -i "s/^version: .*/version: $NEW_VERSION/" "$PACK_FILE"
          
          # Installation et Publication
          codeql pack install
          codeql pack publish

      - name: Commit version update
        id: commit_step
        run: |
          # 1. Configuration de l'identité
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 2. On indexe (stage) les modifications du fichier pack d'abord
          git add ${{ matrix.package }}/qlpack.yml ${{ matrix.package }}/codeql-pack.yml 2>/dev/null || true

          # 3. On vérifie s'il y a vraiment des changements
          if ! git diff --staged --quiet; then
            # 4. On commit localement
            git commit -m "chore: bump ${{ matrix.package }} version [skip ci]"
            
            # 5. On récupère les changements distants avec rebase 
            # (Le rebase fonctionnera car les changements locaux sont maintenant commités)
            git pull --rebase origin main
            
            # 6. On pousse
            git push origin main
            echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            echo "Aucun changement détecté."
            echo "new_sha=" >> $GITHUB_OUTPUT
          fi

      - name: Mark commit as successful via API
        if: steps.commit_step.outputs.new_sha != ''
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.commit_step.outputs.new_sha }} \
            -d '{
              "state":"success",
              "target_url":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "description":"Le pack CodeQL ${{ matrix.package }} a été publié.",
              "context":"CodeQL Publish (${{ matrix.package }})"
            }'
